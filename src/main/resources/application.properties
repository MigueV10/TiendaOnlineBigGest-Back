spring.application.name=crud_proyecto

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# --- DB (usar variables de entorno en despliegue) ---
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/factu?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.web.resources.static-locations=classpath:/static/,file:uploads/

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

server.port=8080
server.address=0.0.0.0

# CORS (separado por comas)
app.cors.allowed-origins=http://localhost:5173,http://localhost:5174,https://main.d19lyjmonu04ta.amplifyapp.com

# JWT
app.jwt.secret=${JWT_SECRET:change-me}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}
